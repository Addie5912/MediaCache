---
#APPLICATION_ID: CSE optional
#负载均衡设置
cse:
  loadbalance:
    strategy:
      name: weightedResponse
      sessionTimeoutInSeconds: 30
    retryEnabled: false
    retryOnNext: 2
    retryOnSame: 3
    #serverListFilters: zoneaware
    backoff:
      kind: constant
      MinMs: 200
      MaxMs: 400

